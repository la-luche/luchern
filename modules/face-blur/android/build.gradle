apply plugin: 'com.android.library'

group = 'expo.modules.faceblur'
version = '1.0.0'

def expoModulesCorePlugin = new File(
  project(':expo-modules-core').projectDir.absolutePath,
  'ExpoModulesCorePlugin.gradle'
)
apply from: expoModulesCorePlugin
applyKotlinExpoModulesCorePlugin()
useCoreDependencies()
useExpoPublishing()
useDefaultAndroidSdkVersions()

android {
  namespace 'expo.modules.faceblur'

  defaultConfig {
    versionCode 1
    versionName '1.0.0'
  }

  sourceSets {
    main.assets.srcDirs += ["${projectDir}/../ios/Resources"]
  }

  lintOptions {
    abortOnError false
  }
}

dependencies {
  implementation 'androidx.media3:media3-common:1.10.1'
  implementation 'androidx.media3:media3-effect:1.10.1'
  implementation 'androidx.media3:media3-transformer:1.10.1'
  implementation 'com.google.ai.edge.litert:litert:1.0.1'
}
