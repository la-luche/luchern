<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f7f8fa" />
    <title>Open Luche</title>
    <style>
      :root { color-scheme: light; font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100dvh; display: grid; place-items: center; padding: 28px; color: #17191c; background: #f7f8fa; }
      main { width: min(100%, 420px); padding: 36px 28px 30px; text-align: center; background: #fff; border: 1px solid #e7e9ed; border-radius: 24px; box-shadow: 0 18px 48px rgba(16, 24, 40, .08); }
      .mark { display: grid; place-items: center; width: 64px; height: 64px; margin: 0 auto 20px; border-radius: 18px; color: #fff; background: #208aef; font-size: 33px; font-weight: 750; letter-spacing: -.06em; }
      h1 { margin: 0; font-size: 30px; letter-spacing: -.035em; }
      p { margin: 12px auto 0; color: #626872; font-size: 16px; line-height: 1.5; }
      .qr { display: block; width: 210px; height: 210px; margin: 22px auto 0; border-radius: 12px; }
      .scan { margin-top: 8px; font-size: 13px; color: #747b85; }
      .button { display: block; margin-top: 26px; padding: 15px 18px; color: #fff; background: #208aef; border-radius: 13px; font-size: 17px; font-weight: 700; text-decoration: none; }
      .button:active { transform: scale(.985); }
      .secondary { display: inline-block; margin-top: 18px; color: #3f4650; font-size: 14px; font-weight: 600; }
      .hint { margin-top: 22px; font-size: 13px; color: #8a9099; }
    </style>
  </head>
  <body>
    <main>
      <div class="mark" aria-hidden="true">L</div>
      <h1>Open Luche</h1>
      <p>Luche runs in Expo Go. Scan this code with your phone camera or tap the button below.</p>
      <img class="qr" src="/_luche/expo-go-qr.svg" alt="QR code that opens Luche in Expo Go" width="210" height="210" />
      <p class="scan">The QR code opens Luche directly in Expo Go.</p>
      <a class="button" id="open" href="{{EXPO_GO_URL}}">Open in Expo Go</a>
      <a class="secondary" href="https://expo.dev/go">Install Expo Go</a>
      <p class="hint">Keep this page open while Luche loads for the first time.</p>
    </main>
    <script>
      const expoUrl = "{{EXPO_GO_URL}}";
      const mobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
      if (mobile) window.location.assign(expoUrl);
    </script>
  </body>
</html>
